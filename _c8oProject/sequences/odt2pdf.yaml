    	    }
    	
    	    var normalizedStylesBytes = normalizeStylesXml(stylesBytes);
    	    if (!normalized_first_page_headers) {
    	        return null;
    	    }
    	
    	    var tempFile = File.createTempFile("c8o-odt2pdf-", ".odt");
    	    var inputZip = null;
    	    var outputZip = null;
    	    try {
    	        inputZip = new ZipInputStream(new FileInputStream(new File(filePath)));
    	        outputZip = new ZipOutputStream(new FileOutputStream(tempFile));
    	
    	        var entry = null;
    	        while ((entry = inputZip.getNextEntry()) != null) {
    	            var entryName = String(entry.getName());
    	            var entryBytes = readAllBytes(inputZip);
    	
    	            if (entryName == "styles.xml") {
    	                entryBytes = normalizedStylesBytes;
    	            } else if (entryName == "content.xml") {
    	                entryBytes = normalizeMasterPageReferencesXml(entryBytes);
    	            }
    	
    	            writeZipEntry(outputZip, entry, entryBytes);
    	        }
    	    } catch (e) {
    	        try { tempFile["delete"](); } catch (ignore) {}
    	        throw e;
    	    } finally {
    	        if (inputZip) inputZip.close();
    	        if (outputZip) outputZip.close();
    	    }
    	
    	    log.warn("ODT normalized for first-page headers/footers before PDF conversion: " + tempFile.getAbsolutePath());
    	    return tempFile;
    	}
    	
