    	        updateMasterPageReferences(doc);
    	    }
    	    return changed ? xmlToBytes(doc) : bytes;
    	}
    	
    	function writeZipEntry(zip, sourceEntry, bytes){
    	    var newEntry = new ZipEntry(sourceEntry.getName());
    	    if (sourceEntry.getTime() >= 0) {
    	        newEntry.setTime(sourceEntry.getTime());
    	    }
    	    if (sourceEntry.getMethod() == ZipEntry.STORED) {
    	        var crc = new CRC32();
    	        crc.update(bytes);
    	        newEntry.setMethod(ZipEntry.STORED);
    	        newEntry.setSize(bytes.length);
    	        newEntry.setCompressedSize(bytes.length);
    	        newEntry.setCrc(crc.getValue());
    	    }
    	    zip.putNextEntry(newEntry);
    	    zip.write(bytes);
    	    zip.closeEntry();
    	}
    	
    	function createNormalizedOdtForFirstPageHeaders(filePath){
    	    first_page_master_names = new HashMap();
    	    normalized_first_page_headers = false;
    	
    	    var stylesBytes = readZipEntry(filePath, "styles.xml");
    	    if (stylesBytes == null) {
