    	    }
    	
    	    var doc = newDocumentBuilderFactory().newDocumentBuilder().parse(new ByteArrayInputStream(bytes));
    	    return updateMasterPageReferences(doc) ? xmlToBytes(doc) : bytes;
    	}
    	
    	function normalizeStylesXml(bytes){
    	    var doc = newDocumentBuilderFactory().newDocumentBuilder().parse(new ByteArrayInputStream(bytes));
    	    var masterPages = doc.getElementsByTagNameNS(STYLE_NS, "master-page");
    	    var masterPageCopy = new ArrayList();
    	    var masterPageNames = new HashSet();
    	    var changed = false;
    	
    	    for (var i = 0; i < masterPages.getLength(); i++) {
    	        var masterPage = masterPages.item(i);
    	        masterPageCopy.add(masterPage);
    	        masterPageNames.add(String(masterPage.getAttributeNS(STYLE_NS, "name")));
    	    }
    	
    	    for (var j = 0; j < masterPageCopy.size(); j++) {
    	        var originalMasterPage = masterPageCopy.get(j);
    	        var headerFirst = getDirectChild(originalMasterPage, STYLE_NS, "header-first");
    	        var footerFirst = getDirectChild(originalMasterPage, STYLE_NS, "footer-first");
    	        if (headerFirst == null && footerFirst == null) {
    	            continue;
    	        }
    	
    	        var originalName = String(originalMasterPage.getAttributeNS(STYLE_NS, "name"));
    	        if (originalName == "") {
    	            continue;
    	        }
    	
    	        var firstPageName = originalName + "_c8o_first";
    	        var nameIndex = 1;
    	        while (masterPageNames.contains(firstPageName)) {
    	            firstPageName = originalName + "_c8o_first" + (nameIndex++);
    	        }
    	        masterPageNames.add(firstPageName);
    	        first_page_master_names.put(originalName, firstPageName);
    	
    	        var firstPageMasterPage = originalMasterPage.cloneNode(true);
    	        firstPageMasterPage.setAttributeNS(STYLE_NS, "style:name", firstPageName);
    	        firstPageMasterPage.setAttributeNS(STYLE_NS, "style:next-style-name", originalName);
    	
    	        var firstPageHeader = getDirectChild(firstPageMasterPage, STYLE_NS, "header-first");
    	        if (firstPageHeader != null) {
    	            removeDirectChildren(firstPageMasterPage, STYLE_NS, "header");
    	            doc.renameNode(firstPageHeader, STYLE_NS, "style:header");
    	        }
    	
    	        var firstPageFooter = getDirectChild(firstPageMasterPage, STYLE_NS, "footer-first");
    	        if (firstPageFooter != null) {
    	            removeDirectChildren(firstPageMasterPage, STYLE_NS, "footer");
    	            doc.renameNode(firstPageFooter, STYLE_NS, "style:footer");
    	        }
    	
    	        removeDirectChildren(firstPageMasterPage, STYLE_NS, "header-first");
    	        removeDirectChildren(firstPageMasterPage, STYLE_NS, "footer-first");
    	        removeDirectChildren(originalMasterPage, STYLE_NS, "header-first");
    	        removeDirectChildren(originalMasterPage, STYLE_NS, "footer-first");
    	
    	        originalMasterPage.getParentNode().insertBefore(firstPageMasterPage, originalMasterPage);
    	        changed = true;
