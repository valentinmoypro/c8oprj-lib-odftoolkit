    	function getDirectChild(parent, namespaceUri, localName){
    	    var node = parent.getFirstChild();
    	    while (node != null) {
    	        if (node.getNodeType() == Node.ELEMENT_NODE
    	            && node.getNamespaceURI() != null
    	            && node.getLocalName() != null
    	            && String(node.getNamespaceURI()) == namespaceUri
    	            && String(node.getLocalName()) == localName) {
    	            return node;
    	        }
    	        node = node.getNextSibling();
    	    }
    	    return null;
    	}
    	
