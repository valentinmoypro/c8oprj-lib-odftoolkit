    	                node.setAttributeNS(STYLE_NS, "style:master-page-name", String(first_page_master_names.get(oldName)));
    	                changed = true;
    	            }
    	        }
    	    }
    	    return changed;
    	}
    	
    	function normalizeMasterPageReferencesXml(bytes){
    	    if (first_page_master_names == null || first_page_master_names.isEmpty()) {
