	<script type="text/javascript" src="scripts/poller.js"></script>
	<script>
		function loadit(element) {
			var tabs;
			var elcurrent;
			var ste_session = "";
			var agc_session = "";
			var dsp_session = "";

			tabs = document.getElementById('tabs').getElementsByTagName("a");
			for (var i = 0; i < tabs.length; i++) {
				elcurrent = document.getElementById("container" + parseInt(i + 1));
				if (tabs[i].rel == element.rel) {
					tabs[i].className = "selected";
					ste_session = localStorage.getItem(element.rel + "_ste");
					agc_session = localStorage.getItem(element.rel + "_agc");
					dsp_session = localStorage.getItem(element.rel + "_dsp");
					ste_session != null ? document.getElementById("ste").innerText = ste_session : document.getElementById("ste").innerText =
						"";
					agc_session != null ? document.getElementById("agc").innerText = agc_session : document.getElementById("agc").innerText =
						"";
					dsp_session != null ? document.getElementById("dsp").innerText = dsp_session : document.getElementById("dsp").innerText =
						"";
					if (!elcurrent.classList.contains('containerVisible')) {
						elcurrent.classList.add('containerVisible');
					}
					if (elcurrent.classList.contains('containerInvisible'))
						elcurrent.classList.remove('containerInvisible');
					if (elcurrent.src == "") {
						elcurrent.src = "index.html?__transaction=XMLize&v=26.02.006&__context=Lox" + parseInt(i + 1); // correction JG_2018_02_27 sessions fantômes quandd ouvertures simultanées des 3 sessions
					}
					elcurrent.contentWindow.focus(); // correction JG_2018_02_23 focus quand changement de sessions

				} else {
					tabs[i].className = "";
					if (!elcurrent.classList.contains('containerInvisible'))
						elcurrent.classList.add('containerInvisible');
					if (elcurrent.classList.contains('containerVisible')) {
						elcurrent.classList.remove('containerVisible');

					}
				}

			}
		}
	</script>
